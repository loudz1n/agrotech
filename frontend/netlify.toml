[build]
command = "npm run build"
publish = "dist"

[functions]
directory = "../netlify/functions"
node_bundler = "esbuild"

[[redirects]]
from = "/registros/*"
to = "/.netlify/functions/registros/:splat"
status = 200

[[redirects]]
from = "/registros"
to = "/.netlify/functions/registros"
status = 200

[[redirects]]
from = "/campos/*"
to = "/.netlify/functions/campos/:splat"
status = 200

[[redirects]]
from = "/campos"
to = "/.netlify/functions/campos"
status = 200

[[redirects]]
from = "/claude"
to = "/.netlify/functions/claude"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200